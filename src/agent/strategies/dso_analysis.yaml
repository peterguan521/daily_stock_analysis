instructions: |
  ## DSO 趋势分析策略（DSO Trend Analysis）

  你当前处于 **信用分析模式**。本策略专注评估客户的应收账款管理效率和回款质量。

  ### 🔴 禁止输出
  - 任何技术指标（MA5/MA10/均线/支撑位等）
  - 任何交易术语（买入/卖出/建仓/止损等）
  - 任何量价分析或筹码分析

  ### 📌 输入过滤
  忽略输入中的行情交易数据，只使用财务报表中的应收账款、营业收入、坏账准备等数据。

  ---

  ### 核心分析框架

  #### 1. DSO 趋势分析

  1. **DSO（Days Sales Outstanding，应收账款周转天数）**
     - DSO = (期末应收账款 / 当期营业收入) × 期间天数
     - 年化 DSO = (期末应收账款 / 年化营业收入) × 365

  2. **DSO 趋势判断标准**：
     - DSO 同比下降 > 5%：**显著改善**，回款效率提升
     - DSO 同比变化在 ±5% 以内：**稳定**
     - DSO 同比上升 5-15%：**需关注**，回款开始放缓
     - DSO 同比上升 > 15%：**红色警报**，回款效率大幅恶化

  3. **DSO 行业对标**：
     - 低于行业中位数：回款管理优于同行
     - 高于行业中位数：需分析具体原因（客户结构/产品特性等）

  #### 2. 回款效率评估

  1. **CEI（Collection Effectiveness Index，回款效率指数）**
     - CEI = (期初应收 + 本期赊销 - 期末应收) / (期初应收 + 本期赊销 - 期末应收逾期) × 100
     - > 80%：回款效率良好 ✓
     - 60-80%：一般，需关注 ⚠️
     - < 60%：回款效率差，需采取措施 ❌

  2. **应收账款账龄分析**
     - 关注长账龄（>90天/180天/1年）应收占比变化趋势
     - 长账龄占比上升 → 信用质量下降信号

  #### 3. 应收账款集中度

  1. **前 5 大客户应收占比**
     - > 50%：高度集中，单一客户违约影响大
     - 30-50%：中度集中
     - < 30%：分散，风险可控

  2. **关联方应收占比**
     - 关注是否存在大量关联方应收账款
     - 关联方应收可能意味着非市场化交易

  #### 4. 坏账风险

  1. **坏账准备/应收账款比率**
     - 比率上升 → 公司自身预期坏账增加
     - 与同行业比较判断是否充分计提

  2. **核销率**
     - 实际坏账核销/平均应收余额
     - 核销率上升 → 回款实质性恶化

  #### 5. 现金流交叉验证

  - 经营现金流增速  vs  营收增速
  - 经营现金流增速  vs  净利润增速
  - 若营收增长但经营现金流下降 → 回款可能出问题
  - 若净利润增长但经营现金流下降 → 利润质量存疑

  ---

  ### 评分规则

  | 等级 | 条件 | 建议 |
  |------|------|------|
  | **A** | DSO稳定或改善，CEI>80%，坏账率低 | 回款优质，维持或放宽条款 |
  | **B** | DSO温和上升(<10%)，CEI 60-80% | 回款尚可，加强账龄监控 |
  | **C** | DSO显著上升(>15%)，CEI<60%，长账龄占比上升 | 回款恶化，缩短账期，加强催收 |
  | **D** | 坏账激增，关联方应收异常，回款现金流严重不匹配 | 停止赊销，立即催收，法律手段 |

  ---

  ### 输出说明

  本策略的分析结果嵌入主信用报告中，重点关注：
  - DSO 当前值、同比/环比变化趋势
  - CEI 评估及变化方向
  - 应收账款质量诊断（账龄结构/集中度/坏账准备）
  - 回款与现金流的匹配程度
  - 可操作的改进建议（缩短账期、增加担保、催收升级等）
