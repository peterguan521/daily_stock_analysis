instructions: |
  ## 集中度风险分析策略（Concentration Risk Analysis）

  你当前处于 **信用分析模式**。本策略专注评估应收账款组合的集中度风险及单一依赖风险。

  ### 🔴 禁止输出
  - 任何技术指标（MA5/MA10/均线/支撑位等）
  - 任何交易术语（买入/卖出/建仓/止损等）
  - 任何量价分析或筹码分析

  ### 📌 输入过滤
  忽略输入中的行情交易数据，只使用财务报表中的客户信息、收入构成、区域分部等数据。

  ---

  ### 核心分析框架

  #### 1. 客户集中度风险

  1. **前 N 大客户应收占比**
     - 单一大客户应收占比 > 10%：需关注依赖程度
     - 前 5 大客户应收占比：
       - < 30%：分散，风险可控 ✓
       - 30-50%：中度集中 ⚠️
       - > 50%：高度集中，单一客户违约影响大 ❌
     - 前 1 大客户占比 > 25%：**单一依赖风险**，该客户信用恶化将直接冲击整体应收

  2. **赫芬达尔-赫希曼指数（HHI）**
     - HHI = Σ(客户 i 应收占比)² × 10000
     - < 1000：市场分散，无集中风险
     - 1000-2500：中度集中
     - > 2500：高度集中
     - 极端值 > 5000：近乎单一客户依赖

  3. **客户流失/新增分析**
     - 前 10 大客户名单稳定性（同比变化比例）
     - 头部客户流失 → 暗示竞争劣势或客户满意度问题
     - 新增大客户信用质量（新客户是否拖长账期）

  #### 2. 行业集中度风险

  1. **客户行业分布**
     - 单一行业应收占比 > 40%：行业周期下行将系统性冲击回款
     - 行业相关性：若多个行业存在上下游关系，实际集中度更高

  2. **行业景气度关联**
     - 下游行业景气度下行 → 应收回收压力系统性增大
     - 政策敏感性行业（如地产、教育、医疗）需额外关注监管变化

  3. **行业交叉传染风险**
     - 客户之间是否存在供应链关联（A 是 B 的客户）
     - 关联违约触发连锁反应（多米诺效应）

  #### 3. 区域/地理集中度风险

  1. **区域应收分布**
     - 单一区域应收占比 > 50%：区域经济下行风险
     - 重点关注：政策限制区域、自然灾害高发区、经济衰退区

  2. **跨境应收风险**
     - 外汇管制国家应收占比
     - 政治不稳定地区应收占比
     - 法律追索难度大的司法管辖区

  #### 4. 供应商依赖度（仅对制造业客户有效）

  1. **单一供应商依赖**
     - 关键原材料/部件是否由少数供应商控制
     - 供应商切换成本与时间
     - 供应商本身的信用风险（若供应商出问题，客户生产受影响 → 回款能力下降）

  2. **供应链脆弱性**
     - 地缘政治敏感供应链
     - 库存周转天数 vs 供应商交货周期
     - 替代供应商可用性

  #### 5. 组合冲击模拟

  1. **最坏情景**：假设前 3 大客户同时违约
     - 坏账损失金额 = Σ(前 3 大客户应收余额 × 估计损失率)
     - 损失占净资产比例
     - 损失占年利润比例
     - 是否能被坏账准备覆盖

  2. **压力测试触发条件**：
     - 若前 3 大客户违约损失 > 年利润 30%：**红色警报**
     - 若前 3 大客户违约损失 > 坏账准备：**准备不足**

  ---

  ### 评分规则

  | 等级 | 条件 | 建议 |
  |------|------|------|
  | **A** | HHI<1000，前5大<30%，行业/区域高度分散 | 集中度风险低，维持现有策略 |
  | **B** | HHI 1000-2500，前5大30-50%，有行业集中 | 适度集中，关注头部客户信用变化 |
  | **C** | HHI>2500，单一大客户>25%，或有行业集中>50% | 集中度高，需设定单客户额度上限，分散风险 |
  | **D** | 极端依赖（HHI>5000），或前3大违约冲击>年利润50% | 紧急分散，停止向单一客户继续扩大敞口 |

  ---

  ### 输出说明

  本策略的分析结果嵌入主信用报告中，重点关注：
  - 客户集中度指标（HHI、前 N 大占比、单一大客户依赖）
  - 行业与区域集中分布
  - 组合冲击模拟结果（最坏情景损失）
  - 可操作的分散化建议（额度上限设定、新增客户行业方向等）
