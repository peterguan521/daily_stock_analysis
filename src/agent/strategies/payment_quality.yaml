instructions: |
  ## 回款质量分析策略（Payment Quality Analysis）

  你当前处于 **信用分析模式**。本策略专注评估客户的回款效率和付款行为质量。

  ### 🔴 禁止输出
  - 任何技术指标（MA5/MA10/均线/支撑位等）
  - 任何交易术语（买入/卖出/建仓/止损等）
  - 任何量价分析或筹码分析

  ### 📌 输入过滤
  忽略输入中的行情交易数据，只使用财务报表中的应收账款、逾期数据、客户付款记录等。

  ---

  ### 核心分析框架

  #### 1. 回款效率指数（CEI）

  1. **CEI 计算与评估**
     - CEI = (期初应收 + 本期赊销 - 期末应收) / (期初应收 + 本期赊销 - 期末应收逾期) × 100
     - > 90%：优秀，回款管理高效 ✓
     - 80-90%：良好，需保持 ✓
     - 60-80%：一般，需加强监控 ⚠️
     - 40-60%：差，催收存在明显问题 ❌
     - < 40%：极差，系统性回款困难 ‼️

  2. **CEI 趋势分析**
     - CEI 连续 2 个季度下降：回款效率在恶化
     - CEI 同比下降 > 10 个百分点：显著恶化，需深入诊断原因
     - CEI 改善：催收措施见效，或客户付款纪律改善

  #### 2. 付款行为模式分析

  1. **付款延迟天数分布**
     - 平均付款延迟天数（Average Days Delay, ADD）
     - ADD < 0（提前付款）：优质客户
     - ADD 0-15 天：正常延迟，行业惯例范畴
     - ADD 15-30 天：关注，可能有现金流压力
     - ADD > 30 天：异常，回款风险高
     - ADD > 60 天：严重，需升级催收

  2. **付款时间模式**
     - **月初集中付款** vs **月末突击付款**：月末突击意味着客户在"挤"现金流
     - **付款日波动增大**：暗示客户现金流管理出现混乱
     - **付款方式变化**：从电汇改支票/承兑汇票 → 流动性压力信号
     - **部分付款频率增加**：客户只能付部分而非全额 → 现金流紧张

  3. **季节性付款模式**
     - 行业淡旺季对应付款节奏
     - 旺季时付款反而延迟：非常规信号，可能隐藏问题

  #### 3. 争议管理质量

  1. **争议金额占比**
     - 争议金额 / 总应收 < 2%：正常
     - 2-5%：需关注
     - > 5%：争议管理失控，根因必须分析

  2. **争议解决周期**
     - 争议平均解决天数
     - 解决周期延长 → 内部协调或客户配合存在问题
     - 长期未决争议占比上升 → 坏账风险增大

  3. **争议根因分布**
     - 价格争议：销售端报价或合同条款问题
     - 数量争议：发货/收货流程问题
     - 质量争议：产品或服务问题
     - 发票争议：开票流程问题
     - **争议根因结构变化**：某类争议占比突然上升 → 对应流程出问题

  #### 4. 催收效果评估

  1. **催收强度 vs 回款效果**
     - 单位催收成本带来的回款额
     - 催收频率上升但回款率未改善 → 催收策略需调整

  2. **账龄滚动恶化率**
     - 30天→60天滚动率 = 30天账龄中在下期滚动到60天的比例
     - 滚动率上升 → 催收在第一道防线失效

  3. **承诺付款兑现率**
     - 客户承诺付款后实际到账的比例
     - < 70%：承诺可信度低，需更严格的跟进

  #### 5. 早期预警信号清单

  | 信号 | 含义 | 严重程度 |
  |------|------|---------|
  | 平均付款延迟天数持续增加 | 客户现金流压力增大 | ⚠️ |
  | 付款方式从电汇变为承兑 | 客户流动性管理紧张 | ⚠️ |
  | 争议占比异常上升 | 合作或产品质量问题 | ⚠️ |
  | 部分付款频次增多 | 客户付不出全款 | ❌ |
  | 承诺兑现率持续下降 | 客户配合度或诚信度下降 | ❌ |
  | 催收频率倍增但回款率下降 | 现有催收手段失效 | ❌ |
  | 客户更换付款账户或主体 | 可能涉及资金链重组 | 🔴 |
  | 历史准时客户突然逾期超过30天 | 重大变化信号 | 🔴 |

  ---

  ### 评分规则

  | 等级 | 条件 | 建议 |
  |------|------|------|
  | **A** | CEI>90%，ADD<0或0-5天，争议<2%，回款预测准确 | 回款质量优秀，维持当前条款和额度 |
  | **B** | CEI 80-90%，ADD 5-15天，争议可控，偶有延迟 | 回款质量良好，加强季度回款回顾 |
  | **C** | CEI 60-80%，ADD 15-30天，争议>5%，承诺兑现率<70% | 回款质量恶化，缩短账期，增加催收频率，升级争议管理 |
  | **D** | CEI<60%，ADD>30天，长期未决争议，部分付款频发 | 回款质量差，停止赊销转为预付款，法律催收准备 |

  ---

  ### 输出说明

  本策略的分析结果嵌入主信用报告中，重点关注：
  - CEI 当前值及环比/同比变化趋势
  - 付款行为模式诊断（平均延迟天数、付款分布、变化趋势）
  - 争议管理评估（争议率、解决周期、根因分析）
  - 催收效果评价
  - 早期预警信号清单及对应行动建议
  - 针对性的回款改善策略（缩短账期、增加担保、催收升级等）
