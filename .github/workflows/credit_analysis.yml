# Credit Analysis Workflow
name: 每日信用分析

on:
  schedule:
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

concurrency:
  group: credit-analysis
  cancel-in-progress: false

jobs:
  credit-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - run: sleep $((RANDOM % 30))
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p data logs reports
      - name: Run credit analysis
        env:
          AGENT_MODE: "true"
          AGENT_SKILLS: "credit_analysis"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: python main.py --no-market-review
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: credit-reports-${{ github.run_number }}
          path: reports/
          retention-days: 60
