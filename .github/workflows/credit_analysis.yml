# Credit Analysis Workflow
# Daily automated credit risk assessment for monitored stocks.
# Uses DSA's data pipeline with credit_analysis skill activated.

name: 每日信用分析

on:
  # Schedule: workdays at 10:30 Beijing time (UTC 02:30)
  schedule:
    - cron: '30 2 * * 1-5'

  # Manual trigger
  workflow_dispatch:

concurrency:
  group: credit-analysis
  cancel-in-progress: false

jobs:
  credit-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Startup delay
        run: sleep $((RANDOM % 30))

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare directories
        run: |
          mkdir -p data logs reports

      - name: Run credit analysis
        env:
          AGENT_MODE: "true"
          AGENT_SKILLS: "credit_analysis"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          echo "=========================================="
          echo "信用分析扫描开始"
          echo "Mode: Agent Mode + credit_analysis Skill"
          echo "=========================================="
          python -c "
import os
checks = {
    'Agent Mode': os.getenv('AGENT_MODE'),
    'Credit Skill': os.getenv('AGENT_SKILLS'),
    'DeepSeek Key': 'OK' if os.getenv('DEEPSEEK_API_KEY') else 'MISSING',
    'Tushare Token': 'OK' if os.getenv('TUSHARE_TOKEN') else 'MISSING',
}
for k, v in checks.items():
    print(f'  {k}: {v}')
"
          python main.py --no-market-review

      - name: Upload reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: credit-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 60
